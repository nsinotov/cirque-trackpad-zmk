# Pointing device
CONFIG_ZMK_POINTING=y

# I2C and Pinnacle driver
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_PINNACLE=y

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Battery reporting disabled (no battery divider wired)
CONFIG_ZMK_BATTERY_REPORTING=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=100
CONFIG_I2C_LOG_LEVEL_DBG=y
CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# USB logging and debug shell
CONFIG_ZMK_USB_LOGGING=y
CONFIG_SHELL=y
CONFIG_I2C_SHELL=y

# Delay Pinnacle init — Cirque needs ~300ms power-on reset
CONFIG_INPUT_INIT_PRIORITY=99
